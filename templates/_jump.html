{# Cross-collection paper picker (Jump-to modal). A collection dropdown (default = current)
   scopes the list; typing searches across ALL collections. Fills the fixed-height modal body. #}
<div class="flex flex-col h-full" x-data='jumpPicker({{ groups|tojson }}, "{{ current }}")'>
  <div class="shrink-0 space-y-2">
    <div class="flex items-center gap-2">
      <span class="text-xs text-slate-500 shrink-0">Collection</span>
      <select x-model="col" :disabled="q.trim().length > 0"
              class="flex-1 min-w-0 rounded-lg border border-slate-300 bg-white px-2 py-1.5 text-sm disabled:opacity-50">
        <template x-for="c in cols" :key="c.slug">
          <option :value="c.slug" x-text="c.name + (c.current ? ' (current)' : '') + ' · ' + c.count"></option>
        </template>
      </select>
    </div>
    <input x-model="q" x-ref="jumpq" placeholder="Search papers across collections…"
           class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-slate-400">
  </div>

  <div class="mt-2 flex-1 min-h-0 overflow-auto rounded-lg border border-slate-100">
    <template x-if="!rows().length">
      <p class="px-3 py-6 text-center text-sm text-slate-400" x-text="q.trim() ? 'No matching papers.' : 'No papers in this collection.'"></p>
    </template>
    <ul class="divide-y divide-slate-50">
      <template x-for="p in rows()" :key="p.slug + '-' + p.id">
        <li>
          <a :href="`/c/${p.slug}/p/${p.id}`"
             class="block px-3 py-2 hover:bg-slate-50 transition">
            <span class="block text-sm text-slate-800 leading-snug" x-text="p.title"></span>
            <span class="block text-xs text-slate-400 truncate">
              <span x-show="q.trim()" x-text="p.gname + ' · '"></span><span x-text="p.meta"></span>
            </span>
          </a>
        </li>
      </template>
    </ul>
  </div>
</div>
<script>
  // jumpPicker() is defined in base.html (global) so Alpine finds it the instant this
  // HTMX-swapped fragment lands. Here we only focus the search box.
  (() => { const i = document.querySelector('#jump-body [x-ref="jumpq"]'); if (i) setTimeout(() => i.focus(), 30); })();
</script>
