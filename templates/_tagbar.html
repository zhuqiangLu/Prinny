{# Custom-tag bar for a collection. Expects: slug, tags (list of {label,color}).
   Used on the landing card and the collection page. Saves via POST /c/<slug>/tags. #}
<div x-data='tagBar("{{ slug }}", {{ (tags or [])|tojson }})'
     class="relative flex flex-wrap items-center gap-1.5"
     :class="open ? 'z-30' : 'z-10'">
  <template x-for="(t, i) in tags" :key="i">
    <span class="inline-flex items-center gap-1 rounded-full text-xs px-2 py-0.5" :style="pillStyle(t.color)">
      <span x-text="t.label"></span>
      <button type="button" @click="remove(i)" class="leading-none opacity-60 hover:opacity-100" title="Remove tag">×</button>
    </span>
  </template>

  <div class="relative">
    <button type="button" @click="open = !open"
            class="rounded-full border border-slate-300 text-slate-400 hover:text-slate-700 hover:border-slate-400 text-xs px-2 py-0.5">+ tag</button>
    <div x-show="open" x-cloak @click.outside="open = false"
         class="absolute left-0 top-full mt-1 z-30 w-56 rounded-lg border border-slate-200 bg-white shadow-lg p-2 space-y-2">
      <input x-model="label" x-ref="tagInput" maxlength="40" placeholder="tag label"
             @keydown.enter.prevent="add()"
             class="w-full rounded border border-slate-300 px-2 py-1 text-sm">
      <div class="flex flex-wrap items-center gap-1.5">
        <template x-for="p in presets" :key="p">
          <button type="button" @click="color = p" :style="`background:${p}`"
                  class="w-5 h-5 rounded-full" :class="color === p ? 'ring-2 ring-offset-1 ring-slate-500' : 'border border-slate-300'"></button>
        </template>
        <input type="color" x-model="color" title="custom color"
               class="w-6 h-6 rounded border border-slate-300 p-0 bg-transparent cursor-pointer">
      </div>
      <div class="flex justify-end gap-1">
        <button type="button" @click="open = false" class="text-xs text-slate-500 px-2 py-0.5">cancel</button>
        <button type="button" @click="add()" class="text-xs rounded bg-slate-900 text-white px-2 py-0.5">Add</button>
      </div>
    </div>
  </div>
</div>
