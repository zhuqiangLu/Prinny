{# One message bubble. Expects m = {role, html, images?}. #}
{% if m.images %}
<div class="flex {% if m.role == 'user' %}justify-end{% else %}justify-start{% endif %} mb-1">
  <div class="flex flex-wrap gap-1 max-w-[85%] {% if m.role == 'user' %}justify-end{% endif %}">
    {% for src in m.images %}
    <img src="{{ src }}" onclick="window.dispatchEvent(new CustomEvent('pa-lightbox', {detail: this.src}))"
         class="h-20 w-20 object-cover rounded border border-slate-200 cursor-zoom-in hover:opacity-90" alt="attached image" title="Click to enlarge">
    {% endfor %}
  </div>
</div>
{% endif %}
<div class="flex {% if m.role == 'user' %}justify-end{% else %}justify-start{% endif %}">
  <div class="prose prose-sm max-w-[85%] rounded-lg px-3 py-2
              {% if m.role == 'user' %}bg-slate-900 text-white{% else %}bg-slate-100 text-slate-900{% endif %}">
    {{ m.html | safe }}
  </div>
</div>
